services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    user: "1000:1000"
    init: true
    tty: true
    stdin_open: true
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /app
    user: "1000:1000"
    init: true
    tty: true
    stdin_open: true
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce_recommendations?schema=public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - '4000:4000'
    volumes:
      - ./api:/app
      - ./data:/data:ro
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: ecommerce_recommendations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_recommendations"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
